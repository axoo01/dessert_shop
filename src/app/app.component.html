<main class="main-container">
  <section class="products-section">
    <h1 class="page-title">Desserts</h1>
    <app-product-list></app-product-list>
  </section>

  <aside class="cart-section">
    <app-shopping-cart (confirmOrder)="isModalOpen.set(true)"></app-shopping-cart>
  </aside>
</main>

@if (isModalOpen()) {
  <app-order-confirmed-modal 
    [items]="cartService.items()" 
    [total]="cartService.totalPrice()"
    (startNewOrder)="handleStartNewOrder()">
  </app-order-confirmed-modal>
}
