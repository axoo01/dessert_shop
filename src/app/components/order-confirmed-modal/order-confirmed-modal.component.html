<div class="modal-backdrop">
  <div class="modal-content">
    <img src="assets/images/icon-order-confirmed.svg" alt="Success" class="success-icon">
    
    <h1 class="order-title">Order Confirmed</h1>
    <p class="order-subtitle">We hope you enjoy your food!</p>

    <div class="summary-container">
      <div class="items-list">
        @for (item of items(); track item.name) {
          <div class="item-row">
            <div class="item-main">
              <img [src]="item.image.thumbnail" [alt]="item.name" class="item-thumb">
              <div class="item-details">
                <p class="name">{{ item.name }}</p>
                <div class="meta">
                  <span class="qty">{{ item.quantity }}x</span>
                  <span class="unit-price">&#64; {{ item.price | currency }}</span>
                </div>
              </div>
            </div>
            <p class="line-total">{{ (item.price * item.quantity) | currency }}</p>
          </div>
        }
      </div>

      <div class="order-total">
        <span>Order Total</span>
        <span class="total-amount">{{ total() | currency }}</span>
      </div>
    </div>

    <button class="new-order-btn" (click)="onButtonClick()">
      Start New Order
    </button>
  </div>
</div>
